services:
  web:
    build: .
    container_name: esalon_web
    restart: unless-stopped
    env_file: .env
    ports:
      - "7000:7000"
    volumes:
      # Картинки и SQLite БД переживают пересборку контейнера
      - esalon_uploads:/app/app/static/uploads
      - esalon_data:/app/app/static/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  esalon_uploads:
  esalon_data:
