{# Continuation of a multi-slot booking (not the first 30-min row) #}
<a href="{{ ev.url }}"
   class="schedule-booking-continue group/card relative flex items-stretch min-h-[56px] rounded-xl border border-outline-variant/30 dark:border-outline-dark/30 bg-surface-container-low/80 dark:bg-slate-dark-surface/80 hover:border-primary-container/40 dark:hover:border-[#633dff]/30 transition-colors overflow-hidden"
   title="{{ ev.car_title or ev.title }} · {{ ev.start[11:16] }}–{{ ev.end[11:16] }}">
  <span class="w-1 shrink-0" style="background-color: {{ ev.status_accent }}"></span>
  <div class="flex-1 flex items-center gap-2 px-3 py-2 min-w-0">
    <span class="material-symbols-outlined text-[18px] text-on-surface-variant/60 shrink-0">more_vert</span>
    <span class="text-xs font-medium text-on-surface-variant dark:text-slate-400 truncate tabular-nums">
      {{ ev.start[11:16] }}–{{ ev.end[11:16] }}
      {% if ev.car_title %} · {{ ev.car_title }}{% endif %}
    </span>
  </div>
</a>
