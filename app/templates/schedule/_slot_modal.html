<dialog id="slot-dialog" class="rounded-xl border border-outline-variant dark:border-outline-dark shadow-xl p-0 w-full max-w-md backdrop:bg-black/40">
  <div class="p-5 border-b border-outline-variant/30 dark:border-outline-dark/30 flex items-center justify-between gap-3">
    <div class="min-w-0">
      <h3 class="font-bold text-on-surface dark:text-slate-100">{{ _('schedule.slot_choose_title') }}</h3>
      <p id="slot-dialog-hint" class="text-sm text-on-surface-variant dark:text-slate-400 mt-0.5 truncate"></p>
    </div>
    <button type="button" class="slot-dialog-close w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-low dark:hover:bg-slate-dark-muted" aria-label="{{ _('common.cancel') }}">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  {# Step 1: choice #}
  <div id="slot-step-choice" class="p-5 flex flex-col gap-3">
    <button type="button" id="slot-btn-new-order"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-outline-variant/30 dark:border-outline-dark/30 bg-surface-container-low dark:bg-slate-dark-surface hover:border-primary-container/50 dark:hover:border-[#633dff]/40 transition-colors text-left">
      <span class="w-10 h-10 rounded-lg bg-primary-container/10 text-primary-container flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined">add_box</span>
      </span>
      <span class="font-semibold text-on-surface dark:text-slate-100">{{ _('schedule.slot_new_order') }}</span>
    </button>
    <button type="button" id="slot-btn-existing-order"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-outline-variant/30 dark:border-outline-dark/30 bg-surface-container-low dark:bg-slate-dark-surface hover:border-primary-container/50 dark:hover:border-[#633dff]/40 transition-colors text-left">
      <span class="w-10 h-10 rounded-lg bg-surface-container dark:bg-slate-dark-muted text-on-surface-variant flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined">list_alt</span>
      </span>
      <span class="font-semibold text-on-surface dark:text-slate-100">{{ _('schedule.slot_existing_order') }}</span>
    </button>
  </div>

  {# Step 2: existing orders #}
  <div id="slot-step-orders" class="hidden">
    <div class="px-5 pt-4 pb-2 flex items-center gap-2">
      <button type="button" id="slot-back-btn" class="w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-low dark:hover:bg-slate-dark-muted">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
      </button>
      <p class="font-semibold text-sm text-on-surface dark:text-slate-100">{{ _('schedule.slot_pick_order') }}</p>
    </div>
    <div id="slot-orders-list" class="max-h-[min(360px,50vh)] overflow-y-auto px-3 pb-3 space-y-2"></div>
    <p id="slot-orders-empty" class="hidden px-5 pb-5 text-sm text-on-surface-variant text-center">{{ _('schedule.slot_no_orders') }}</p>
    <p id="slot-orders-loading" class="px-5 pb-5 text-sm text-on-surface-variant text-center">…</p>
  </div>

  <form id="slot-assign-form" method="post" action="{{ url_for('schedule.assign_slot') }}" class="hidden">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <input type="hidden" name="order_number" id="slot-order-number"/>
    <input type="hidden" name="schedule_date" id="slot-schedule-date"/>
    <input type="hidden" name="schedule_time" id="slot-schedule-time"/>
    <input type="hidden" name="branch_id" value="{{ branch_id or '' }}"/>
    <input type="hidden" name="view" value="{{ view }}"/>
    <input type="hidden" name="resource" value="{{ resource }}"/>
    <input type="hidden" name="status" value="{{ status_filter }}"/>
  </form>
</dialog>

<script>
(function () {
  const dialog = document.getElementById('slot-dialog');
  if (!dialog) return;

  const hint = document.getElementById('slot-dialog-hint');
  const stepChoice = document.getElementById('slot-step-choice');
  const stepOrders = document.getElementById('slot-step-orders');
  const ordersList = document.getElementById('slot-orders-list');
  const ordersEmpty = document.getElementById('slot-orders-empty');
  const ordersLoading = document.getElementById('slot-orders-loading');
  const assignForm = document.getElementById('slot-assign-form');
  const scheduleDateInput = document.getElementById('slot-schedule-date');
  const scheduleTimeInput = document.getElementById('slot-schedule-time');
  const orderNumberInput = document.getElementById('slot-order-number');

  const hintTemplate = {{ _('schedule.slot_choose_hint') | tojson }};
  const branchId = {{ branch_id | tojson }};
  const newOrderBase = {{ url_for('orders.new') | tojson }};

  let currentDate = '';
  let currentTime = '';
  let ordersLoaded = false;

  function closeDialog() {
    dialog.close();
    showChoiceStep();
  }

  function showChoiceStep() {
    stepChoice.classList.remove('hidden');
    stepOrders.classList.add('hidden');
  }

  function showOrdersStep() {
    stepChoice.classList.add('hidden');
    stepOrders.classList.remove('hidden');
    if (!ordersLoaded) loadOrders();
  }

  document.querySelectorAll('.slot-dialog-close').forEach(function (btn) {
    btn.addEventListener('click', closeDialog);
  });
  dialog.addEventListener('cancel', function (e) {
    e.preventDefault();
    closeDialog();
  });

  document.getElementById('slot-back-btn')?.addEventListener('click', showChoiceStep);

  window.openScheduleSlotModal = function (date, time, dateLabel) {
    currentDate = date;
    currentTime = time;
    scheduleDateInput.value = date;
    scheduleTimeInput.value = time;
    hint.textContent = hintTemplate.replace('{date}', dateLabel || date).replace('{time}', time);
    ordersLoaded = false;
    ordersList.innerHTML = '';
    ordersEmpty.classList.add('hidden');
    ordersLoading.classList.remove('hidden');
    showChoiceStep();
    dialog.showModal();
  };

  document.getElementById('slot-btn-new-order')?.addEventListener('click', function () {
    const params = new URLSearchParams({ book: '1', date: currentDate, time: currentTime });
    if (branchId) params.set('branch_id', branchId);
    window.location.href = newOrderBase + '?' + params.toString();
  });

  document.getElementById('slot-btn-existing-order')?.addEventListener('click', showOrdersStep);

  async function loadOrders() {
    ordersLoading.classList.remove('hidden');
    ordersEmpty.classList.add('hidden');
    ordersList.innerHTML = '';
    try {
      const params = new URLSearchParams();
      if (branchId) params.set('branch_id', branchId);
      const r = await fetch('/api/schedule/bookable-orders?' + params.toString());
      if (!r.ok) throw new Error('orders');
      const data = await r.json();
      ordersLoaded = true;
      ordersLoading.classList.add('hidden');
      if (!data.orders || !data.orders.length) {
        ordersEmpty.classList.remove('hidden');
        return;
      }
      data.orders.forEach(function (o) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'w-full text-left rounded-xl border border-outline-variant/30 dark:border-outline-dark/30 px-3 py-2.5 hover:border-primary-container/50 dark:hover:border-[#633dff]/40 hover:bg-surface-container-low dark:hover:bg-slate-dark-muted/50 transition-colors';
        btn.innerHTML =
          '<div class="flex items-start justify-between gap-2">' +
            '<div class="min-w-0">' +
              '<p class="font-semibold text-sm text-on-surface dark:text-slate-100 truncate">#' + escapeHtml(o.number) +
              (o.car_title ? ' · ' + escapeHtml(o.car_title) : '') + '</p>' +
              (o.client_name ? '<p class="text-xs text-on-surface-variant truncate">' + escapeHtml(o.client_name) + '</p>' : '') +
            '</div>' +
            '<span class="shrink-0 px-2 py-0.5 rounded text-[10px] font-bold uppercase ui-badge ui-badge--status ' + escapeHtml(o.status_class) + '">' +
              escapeHtml(o.status_label) + '</span>' +
          '</div>';
        btn.addEventListener('click', function () {
          orderNumberInput.value = o.number;
          assignForm.submit();
        });
        ordersList.appendChild(btn);
      });
    } catch (e) {
      ordersLoading.classList.add('hidden');
      ordersEmpty.classList.remove('hidden');
    }
  }

  function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
