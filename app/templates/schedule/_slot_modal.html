<dialog id="slot-dialog" class="rounded-xl border border-outline-variant dark:border-outline-dark shadow-xl p-0 w-full max-w-md backdrop:bg-black/40">
  <div class="p-5 border-b border-outline-variant/30 dark:border-outline-dark/30 relative">
    <button type="button" class="slot-dialog-close absolute right-4 top-4 w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-low dark:hover:bg-slate-dark-muted" aria-label="{{ _('common.cancel') }}">
      <span class="material-symbols-outlined">close</span>
    </button>
    <div class="text-center px-8">
      <h3 class="font-bold text-on-surface dark:text-slate-100">{{ _('schedule.slot_choose_title') }}</h3>
      <p id="slot-dialog-hint" class="text-sm text-on-surface-variant dark:text-slate-400 mt-0.5"></p>
    </div>
  </div>

  <div id="slot-step-choice" class="p-5 flex flex-col gap-3">
    <button type="button" id="slot-btn-new-order"
            class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl border border-outline-variant/30 dark:border-outline-dark/30 bg-surface-container-low dark:bg-slate-dark-surface hover:border-primary-container/50 dark:hover:border-[#633dff]/40 transition-colors text-center cursor-pointer">
      <span class="w-10 h-10 rounded-lg bg-primary-container/10 text-primary-container flex items-center justify-center shrink-0 pointer-events-none">
        <span class="material-symbols-outlined">add_box</span>
      </span>
      <span class="font-semibold text-on-surface dark:text-slate-100 pointer-events-none">{{ _('schedule.slot_new_order') }}</span>
    </button>
    <button type="button" id="slot-btn-existing-order"
            class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl border border-outline-variant/30 dark:border-outline-dark/30 bg-surface-container-low dark:bg-slate-dark-surface hover:border-primary-container/50 dark:hover:border-[#633dff]/40 transition-colors text-center cursor-pointer">
      <span class="w-10 h-10 rounded-lg bg-surface-container dark:bg-slate-dark-muted text-on-surface-variant flex items-center justify-center shrink-0 pointer-events-none">
        <span class="material-symbols-outlined">list_alt</span>
      </span>
      <span class="font-semibold text-on-surface dark:text-slate-100 pointer-events-none">{{ _('schedule.slot_existing_order') }}</span>
    </button>
  </div>

  <div id="slot-step-orders" class="hidden">
    <div class="px-5 pt-4 pb-2 flex items-center gap-2">
      <button type="button" id="slot-back-btn" class="w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-low dark:hover:bg-slate-dark-muted cursor-pointer">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
      </button>
      <p class="font-semibold text-sm text-on-surface dark:text-slate-100">{{ _('schedule.slot_pick_order') }}</p>
    </div>
    <div id="slot-orders-list" class="max-h-[min(360px,50vh)] overflow-y-auto px-3 pb-3 space-y-2"></div>
    <p id="slot-orders-empty" class="hidden px-5 pb-5 text-sm text-on-surface-variant text-center">{{ _('schedule.slot_no_orders') }}</p>
    <p id="slot-orders-loading" class="hidden px-5 pb-5 text-sm text-on-surface-variant text-center">…</p>
  </div>

  <form id="slot-assign-form" method="post" action="{{ url_for('schedule.assign_slot') }}" class="hidden">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <input type="hidden" name="order_number" id="slot-order-number"/>
    <input type="hidden" name="schedule_date" id="slot-schedule-date"/>
    <input type="hidden" name="schedule_time" id="slot-schedule-time"/>
    <input type="hidden" name="branch_id" value="{{ branch_id or '' }}"/>
    <input type="hidden" name="view" value="{{ view }}"/>
    <input type="hidden" name="resource" value="{{ resource }}"/>
    <input type="hidden" name="status" value="{{ status_filter }}"/>
    <input type="hidden" name="employee_id" id="slot-employee-id" value=""/>
    <input type="hidden" name="bay_id" id="slot-bay-id" value=""/>
  </form>
</dialog>
