<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чек #{{ order.number }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @page { size: A4; margin: 12mm; }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff !important; }
    }
  </style>
</head>
<body class="bg-slate-100 text-on-surface p-4">
  <div class="no-print max-w-4xl mx-auto mb-3 flex gap-2">
    <button onclick="window.print()" class="px-3 py-2 rounded-lg bg-slate-900 text-white text-sm">Печать</button>
    <a href="{{ url_for('orders.invoice_pdf', oid=order.id) }}" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">Скачать PDF</a>
    <a href="{{ url_for('orders.detail', oid=order.id) }}" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">Назад к заказу</a>
  </div>

  <main class="max-w-md mx-auto bg-white border border-slate-300 shadow-sm p-6">
    {{ receipt_html | safe }}
  </main>
</body>
</html>
