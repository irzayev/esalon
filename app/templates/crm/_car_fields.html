{# Одна строка полей автомобиля. prefix — для массивов car_brand[] #}
{% macro car_row(body_types, prefix='', brand='', model='', body_type='', plate='', show_remove=false) %}
<div class="car-row grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-2 p-3 bg-slate-50 rounded-xl border border-outline-variant/50">
  <div>
    <label class="text-xs text-on-surface-variant">{{ _('crm.brand') }}</label>
    <input name="car_brand[]" value="{{ brand }}" placeholder="Toyota"
           class="mt-0.5 w-full rounded-lg border-outline-variant text-sm"/>
  </div>
  <div>
    <label class="text-xs text-on-surface-variant">{{ _('crm.model') }}</label>
    <input name="car_model[]" value="{{ model }}" placeholder="Camry"
           class="mt-0.5 w-full rounded-lg border-outline-variant text-sm"/>
  </div>
  <div>
    <label class="text-xs text-on-surface-variant">{{ _('crm.body_type') }}</label>
    <select name="car_body_type[]" class="mt-0.5 w-full rounded-lg border-outline-variant text-sm">
      <option value="">—</option>
      {% for val, lbl in body_types %}
        <option value="{{ val }}" {% if body_type == val %}selected{% endif %}>{{ lbl }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="text-xs text-on-surface-variant">{{ _('crm.plate') }}</label>
    <input name="car_plate[]" value="{{ plate }}" placeholder="XXBBXXX"
           pattern="\d{2}[A-Za-z]{2}\d{3}" title="XXBBXXX"
           maxlength="7"
           class="mt-0.5 w-full rounded-lg border-outline-variant text-sm uppercase"/>
  </div>
  <div class="flex items-end">
    {% if show_remove %}
      <button type="button"
              class="remove-car-row inline-flex items-center justify-center w-10 h-10 rounded-lg text-rose-600 hover:bg-rose-50"
              title="{{ _('common.delete') }}"
              aria-label="{{ _('common.delete') }}">
        <span class="material-symbols-outlined text-[18px]" aria-hidden="true">delete</span>
      </button>
    {% endif %}
  </div>
</div>
{% endmacro %}
