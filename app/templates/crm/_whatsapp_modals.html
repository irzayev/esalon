{# Модальные окна WhatsApp: личная отправка и рассылка #}
<dialog id="wa-send-dialog" class="rounded-xl border border-outline-variant shadow-xl p-0 w-full max-w-md backdrop:bg-black/40">
  <form method="post" action="{{ url_for('crm.whatsapp_send') }}" class="p-6 space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <input type="hidden" name="client_id" id="wa-send-client-id" value=""/>
    <div class="flex items-start justify-between gap-3">
      <div>
        <h3 class="text-lg font-semibold">WhatsApp</h3>
        <p class="text-sm text-on-surface-variant mt-0.5" id="wa-send-client-label"></p>
      </div>
      <button type="button" class="wa-dialog-close text-on-surface-variant hover:text-on-surface" aria-label="{{ _('crm.wa.close') }}">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div>
      <label class="text-sm font-medium text-on-surface-variant">{{ _('crm.wa.template') }}</label>
      <select name="template_key" id="wa-send-template"
              class="mt-1 w-full rounded-lg border-outline-variant focus:border-primary focus:ring-primary text-sm">
        {% for t in wa_templates %}
          <option value="{{ t.key }}">{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="text-sm font-medium text-on-surface-variant">{{ _('crm.wa.custom_text') }}</label>
      <textarea name="custom_text" rows="4" placeholder="{{ _('crm.wa.custom_placeholder') }}"
                class="mt-1 w-full rounded-lg border-outline-variant text-sm font-mono"></textarea>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <button type="button" class="ui-btn-secondary wa-dialog-close">{{ _('common.cancel') }}</button>
      <button type="submit" class="ui-btn-primary">
        <span class="material-symbols-outlined text-[18px]">send</span>
        {{ _('crm.wa.send') }}
      </button>
    </div>
  </form>
</dialog>

<dialog id="wa-broadcast-dialog" class="rounded-xl border border-outline-variant shadow-xl p-0 w-full max-w-md backdrop:bg-black/40">
  <form method="post" action="{{ url_for('crm.whatsapp_broadcast') }}" class="p-6 space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    {% for c in clients %}
      {% if c.phone %}
        <input type="hidden" name="client_ids" value="{{ c.id }}"/>
      {% endif %}
    {% endfor %}
    <div class="flex items-start justify-between gap-3">
      <div>
        <h3 class="text-lg font-semibold">{{ _('crm.wa.broadcast_title') }}</h3>
        <p class="text-sm text-on-surface-variant mt-0.5">
          {{ _('crm.wa.broadcast_count') }} <strong id="wa-broadcast-count">0</strong>
        </p>
      </div>
      <button type="button" class="wa-dialog-close text-on-surface-variant hover:text-on-surface" aria-label="{{ _('crm.wa.close') }}">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div>
      <label class="text-sm font-medium text-on-surface-variant">{{ _('crm.wa.template') }}</label>
      <select name="template_key" required
              class="mt-1 w-full rounded-lg border-outline-variant focus:border-primary focus:ring-primary text-sm">
        {% for t in wa_templates %}
          <option value="{{ t.key }}">{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>
    <p class="text-xs text-on-surface-variant">
      {{ _('crm.wa.templates_hint') }}
      <a href="{{ url_for('admin.settings', section='evolution') }}" class="text-primary-container underline">{{ _('crm.wa.settings_link') }}</a>.
    </p>
    <div class="flex justify-end gap-2 pt-2">
      <button type="button" class="ui-btn-secondary wa-dialog-close">{{ _('common.cancel') }}</button>
      <button type="submit" class="ui-btn-primary"
              onclick="return confirm('{{ _('crm.wa.broadcast_confirm') }}');">
        <span class="material-symbols-outlined text-[18px]">campaign</span>
        {{ _('crm.wa.broadcast_btn') }}
      </button>
    </div>
  </form>
</dialog>

<script>
(function () {
  const sendDialog = document.getElementById('wa-send-dialog');
  const broadcastDialog = document.getElementById('wa-broadcast-dialog');
  if (!sendDialog || !broadcastDialog) return;

  document.querySelectorAll('.wa-dialog-close').forEach(function (btn) {
    btn.addEventListener('click', function () {
      sendDialog.close();
      broadcastDialog.close();
    });
  });

  document.querySelectorAll('.wa-open-send').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.getElementById('wa-send-client-id').value = btn.dataset.clientId || '';
      document.getElementById('wa-send-client-label').textContent = btn.dataset.clientLabel || '';
      sendDialog.showModal();
    });
  });

  const openBroadcast = document.getElementById('wa-open-broadcast');
  if (openBroadcast) {
    openBroadcast.addEventListener('click', function () {
      const count = document.querySelectorAll('#wa-broadcast-dialog input[name="client_ids"]').length;
      document.getElementById('wa-broadcast-count').textContent = String(count);
      broadcastDialog.showModal();
    });
  }
})();
</script>
