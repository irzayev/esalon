<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Оплата недоступна</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen grid place-items-center p-4">
  <div class="text-center bg-white border border-slate-200 rounded-2xl p-8 max-w-md w-full">
    <h1 class="text-xl font-semibold text-slate-900">Ссылка недоступна</h1>
    <p class="mt-3 text-sm text-slate-600">
      {% if reason == 'failed' %}
        Этот платёж уже отменён или завершён с ошибкой. Запросите новую ссылку у администратора.
      {% else %}
        Онлайн-оплата временно отключена. Свяжитесь с сервисом.
      {% endif %}
    </p>
  </div>
</body>
</html>
