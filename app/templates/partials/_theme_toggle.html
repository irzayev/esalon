<div class="theme-switch shrink-0" role="group" aria-label="{{ _('theme.switch') }}">
  <button type="button"
          class="theme-switch__btn"
          data-theme-mode="light"
          aria-label="{{ _('theme.light') }}">
    <span class="material-symbols-outlined" aria-hidden="true">light_mode</span>
  </button>
  <button type="button"
          class="theme-switch__btn"
          data-theme-mode="dark"
          aria-label="{{ _('theme.dark') }}">
    <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
  </button>
</div>
